openapi: 3.0.3
info:
  title: MuseWrite API
  description: |
    AI 驱动的内容生成执行器 - 基于四层卡片体系的内容生成系统

    ## 核心概念

    **四层卡片体系**：
    - 素材卡(Source)：原始素材内容
    - 信息卡(Info)：账号/人设信息
    - 风格卡(Style)：写作风格定义
    - 平台卡(Platform)：发布规范要求

    ## 特点

    - 支持 7 种 LLM Provider
    - 支持 16 个主流平台
    - 内置质量检查和敏感词过滤
    - 支持配图生成(SeedDream)
    - 多账号人设管理
    - 本地优先存储 + iCloud 同步
    - 偏好学习系统
    - 多平台发布支持

  version: 1.0.0
  contact:
    name: MuseWrite Team
    email: support@musewrite.app
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:18062
    description: 本地开发服务器
  - url: https://api.musewrite.app
    description: 生产环境服务器

tags:
  - name: Content Generation
    description: 内容生成相关接口
  - name: Task Management
    description: 任务管理相关接口
  - name: Card Management
    description: 卡片管理相关接口
  - name: Draft Management
    description: 草稿管理相关接口
  - name: Publishing
    description: 平台发布相关接口
  - name: Feedback
    description: 反馈系统相关接口
  - name: Preferences
    description: 偏好学习系统接口
  - name: Storage
    description: 本地存储接口
  - name: System
    description: 系统状态相关接口

paths:
  # ==================== 系统状态 ====================
  /health:
    get:
      tags: [System]
      summary: 基础健康检查
      description: 检查服务是否正常运行
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
              example:
                status: ok
                timestamp: "2026-03-12T08:00:00Z"
                version: "1.0.0"

  /api/v1/health:
    get:
      tags: [System]
      summary: 深度健康检查
      description: 检查服务各组件状态，包括 LLM、存储、配置等
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 健康检查结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResult'
              example:
                status: ok
                timestamp: "2026-03-12T08:00:00Z"
                version: "1.0.0"
                components:
                  llm:
                    status: ok
                    provider: openai
                    model: gpt-4-turbo
                  storage:
                    status: ok
                    type: local
                    available: true
                  config:
                    status: ok
                    valid: true
                uptime: 3600

  /api/v1/status:
    get:
      tags: [System]
      summary: 服务状态
      description: 获取服务详细状态信息，包括 LLM Provider 配置
      responses:
        '200':
          description: 服务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'
              example:
                llm:
                  provider: openai
                  model: gpt-4o-mini
                  configured: true
                version: 1.0.0
                uptime: 3600

  # ==================== 内容生成 ====================
  /api/v1/generate:
    post:
      tags: [Content Generation]
      summary: 生成内容（同步）
      description: |
        根据素材和卡片配置生成内容。这是一个同步接口，适合快速生成场景。

        对于大批量或长时间生成任务，建议使用异步任务接口。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            examples:
              basic:
                summary: 基础生成
                value:
                  source: "今天完成了三层记忆系统的改造..."
                  platform: xiaohongshu
              withImage:
                summary: 生成内容+配图
                value:
                  source: "MuseWrite v1.0.0 发布"
                  platform: xiaohongshu
                  info: stone
                  image: true
              multiPlatform:
                summary: 多平台生成
                value:
                  source: "项目更新内容"
                  platforms: [xiaohongshu, wordpress]
                  info: zhoumo
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
              example:
                success: true
                draft:
                  title: "3个AI工具让你效率翻倍！亲测有效"
                  content: "今天分享3个我常用的AI工具..."
                  tags: ["AI工具", "效率提升"]
                  platform: xiaohongshu
                  account: stone
                  quality:
                    score: 85
                    issues: []
                    warnings: ["建议增加更多个人经历"]
                image:
                  filename: cover-123.png
                  path: /path/to/covers/2026-03-12/
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/generate/batch:
    post:
      tags: [Content Generation]
      summary: 批量生成内容
      description: 为多个平台或账号批量生成内容
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source:
                  type: string
                  description: 素材内容
                platforms:
                  type: array
                  items:
                    type: string
                  description: 目标平台列表
                accounts:
                  type: array
                  items:
                    type: string
                  description: 账号列表（信息卡名称）
                options:
                  $ref: '#/components/schemas/GenerateOptions'
      responses:
        '200':
          description: 批量生成结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/GenerateResponse'
                  total:
                    type: integer
                  failed:
                    type: integer

  # ==================== 卡片管理 ====================
  /api/v1/cards:
    get:
      tags: [Card Management]
      summary: 列出所有卡片
      description: 根据类型列出可用的卡片列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: type
          in: query
          description: 卡片类型
          schema:
            type: string
            enum: [source, info, style, platform]
      responses:
        '200':
          description: 卡片列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'

  /api/v1/cards/{type}/{name}:
    get:
      tags: [Card Management]
      summary: 获取卡片详情
      security:
        - ApiKeyAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [source, info, style, platform]
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 卡片详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 草稿管理 ====================
  /api/v1/drafts:
    get:
      tags: [Draft Management]
      summary: 列出草稿
      description: 列出已生成的草稿列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [draft, pending_review, approved, rejected, published, archived]
        - name: platform
          in: query
          description: 按平台筛选
          schema:
            type: string
        - name: account
          in: query
          description: 按账号筛选
          schema:
            type: string
        - name: search
          in: query
          description: 搜索关键词
          schema:
            type: string
        - name: limit
          in: query
          description: 返回数量限制
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: 分页偏移
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 草稿列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftList'

    post:
      tags: [Draft Management]
      summary: 创建草稿
      description: 手动创建新草稿
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                platform:
                  type: string
                account:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /api/v1/drafts/{id}:
    get:
      tags: [Draft Management]
      summary: 获取草稿详情
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 草稿详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Draft Management]
      summary: 更新草稿
      description: 更新草稿内容或状态，会自动学习用户修改偏好
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [draft, pending_review, approved, rejected, published, archived]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

    delete:
      tags: [Draft Management]
      summary: 删除草稿
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/drafts/{id}/quality:
    get:
      tags: [Draft Management]
      summary: 质量检查
      description: 对草稿进行质量检查
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 质量检查结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityResult'

  # ==================== 版本管理 ====================
  /api/v1/drafts/{id}/versions:
    get:
      tags: [Draft Management]
      summary: 获取版本历史
      description: 获取草稿的所有历史版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                properties:
                  draftId:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: '#/components/schemas/DraftVersion'

    post:
      tags: [Draft Management]
      summary: 创建新版本
      description: 保存当前草稿为新版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 版本说明
      responses:
        '201':
          description: 版本创建成功

  /api/v1/drafts/{id}/versions/{version}:
    get:
      tags: [Draft Management]
      summary: 获取特定版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 版本详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftVersion'

    post:
      tags: [Draft Management]
      summary: 回滚到指定版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  # ==================== 审核流程 ====================
  /api/v1/drafts/{id}/review:
    post:
      tags: [Draft Management]
      summary: 提交审核
      description: 将草稿提交审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewer:
                  type: string
                  description: 指定审核人
                message:
                  type: string
                  description: 提交说明
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /api/v1/drafts/{id}/review/approve:
    post:
      tags: [Draft Management]
      summary: 批准审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 批准说明
      responses:
        '200':
          description: 批准成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /api/v1/drafts/{id}/review/reject:
    post:
      tags: [Draft Management]
      summary: 拒绝审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: 拒绝原因
                suggestions:
                  type: string
                  description: 修改建议
      responses:
        '200':
          description: 拒绝成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /api/v1/reviews:
    get:
      tags: [Draft Management]
      summary: 获取待审核列表
      description: 获取当前用户待审核的草稿列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: assignee
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 审核列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  total:
                    type: integer

  # ==================== 平台发布 ====================
  /api/v1/publish:
    post:
      tags: [Publishing]
      summary: 发布到单个平台
      description: 将草稿发布到指定平台
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
            example:
              draftId: draft-abc123
              platform: wordpress
              options:
                status: draft
      responses:
        '200':
          description: 发布结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
              example:
                success: true
                platform: wordpress
                url: https://example.com/post/123
                id: "123"

  /api/v1/publish/batch:
    post:
      tags: [Publishing]
      summary: 批量发布
      description: 将草稿发布到多个平台
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [draftId, platforms]
              properties:
                draftId:
                  type: string
                platforms:
                  type: array
                  items:
                    type: string
                options:
                  type: object
      responses:
        '200':
          description: 批量发布结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  success:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublishResponse'

  /api/v1/publish/platforms:
    get:
      tags: [Publishing]
      summary: 获取支持的平台列表
      description: 列出所有支持的发布平台及其配置状态
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 平台列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  platforms:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlatformInfo'

  /api/v1/publish/history:
    get:
      tags: [Publishing]
      summary: 获取发布历史
      security:
        - ApiKeyAuth: []
      parameters:
        - name: platform
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 发布历史
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublishRecord'

  # ==================== 偏好学习 ====================
  /api/v1/preferences:
    get:
      tags: [Preferences]
      summary: 获取用户偏好
      description: 获取学习到的用户偏好设置
      security:
        - ApiKeyAuth: []
      parameters:
        - name: context
          in: query
          description: 上下文过滤（如平台、账号）
          schema:
            type: string
      responses:
        '200':
          description: 用户偏好
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'

    put:
      tags: [Preferences]
      summary: 更新用户偏好
      description: 手动更新偏好设置
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                avoid:
                  type: array
                  items:
                    type: string
                prefer:
                  type: array
                  items:
                    type: string
                style:
                  type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'

  /api/v1/preferences/rules:
    get:
      tags: [Preferences]
      summary: 获取学习规则
      description: 获取从编辑行为中学习到的规则
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 学习规则
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreferenceRule'
                  total:
                    type: integer

    delete:
      tags: [Preferences]
      summary: 清除学习规则
      description: 清除所有学习到的规则
      security:
        - ApiKeyAuth: []
      responses:
        '204':
          description: 清除成功

  /api/v1/preferences/format:
    get:
      tags: [Preferences]
      summary: 获取偏好提示词
      description: 获取格式化后的偏好提示词，用于注入到生成请求
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 格式化偏好
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    type: string
                    description: 可直接注入LLM的偏好提示

  # ==================== 本地存储 ====================
  /api/v1/storage/personas:
    get:
      tags: [Storage]
      summary: 列出人设
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 人设列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Persona'

    post:
      tags: [Storage]
      summary: 创建人设
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaInput'
      responses:
        '201':
          description: 创建成功

  /api/v1/storage/personas/{id}:
    get:
      tags: [Storage]
      summary: 获取人设
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 人设详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'

    put:
      tags: [Storage]
      summary: 更新人设
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
