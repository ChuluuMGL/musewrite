                      feishu:
                        type: boolean
                      webhook:
                        type: boolean

# ==================== 组件定义 ====================
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证

  schemas:
    GenerateRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          description: 素材内容
          minLength: 10
          maxLength: 10000
        platform:
          type: string
          description: 目标平台
          default: xiaohongshu
          enum: [xiaohongshu, douyin, wechat, zhihu, bilibili, weibo, toutiao, baijiahao, wordpress, youtube, instagram, tiktok, twitter, linkedin, reddit, github, facebook]
        platforms:
          type: array
          description: 多平台生成时的目标平台列表
          items:
            type: string
        info:
          type: string
          description: 信息卡名称（账号人设）
          default: stone
        style:
          type: string
          description: 风格卡名称
        checkFeedback:
          type: boolean
          description: 是否检查反馈清单
          default: true
        learnPreferences:
          type: boolean
          description: 是否应用学习到的偏好
          default: true
        image:
          type: boolean
          description: 是否生成配图
          default: false
        publish:
          type: boolean
          description: 生成后是否自动发布
          default: false
        options:
          $ref: '#/components/schemas/GenerateOptions'

    GenerateOptions:
      type: object
      properties:
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.7
          description: 生成温度
        maxTokens:
          type: integer
          minimum: 100
          maximum: 4000
          default: 2000
          description: 最大Token数
        timeout:
          type: integer
          description: 超时时间(毫秒)
          default: 60000

    GenerateResponse:
      type: object
      properties:
        success:
          type: boolean
        draft:
          $ref: '#/components/schemas/Draft'
        error:
          type: string

    Draft:
      type: object
      properties:
        id:
          type: string
          description: 草稿ID
        title:
          type: string
          description: 标题
        content:
          type: string
          description: 正文内容
        tags:
          type: array
          description: 标签列表
          items:
            type: string
        platform:
          type: string
          description: 目标平台
        account:
          type: string
          description: 账号名称
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, published, archived]
          default: draft
        quality:
          $ref: '#/components/schemas/QualityResult'
        image:
          $ref: '#/components/schemas/ImageInfo'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          description: 当前版本号
          default: 1

    DraftList:
      type: object
      properties:
        drafts:
          type: array
          items:
            $ref: '#/components/schemas/Draft'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    DraftVersion:
      type: object
      properties:
        version:
          type: integer
        title:
          type: string
        content:
          type: string
        message:
          type: string
          description: 版本说明
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    QualityResult:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: 质量评分
        passed:
          type: boolean
          description: 是否通过质量检查
        issues:
          type: array
          description: 严重问题列表
          items:
            type: string
        warnings:
          type: array
          description: 警告列表
          items:
            type: string
        suggestions:
          type: array
          description: 改进建议
          items:
            type: string
        metrics:
          type: object
          properties:
            titleScore:
              type: integer
            contentScore:
              type: integer
            completenessScore:
              type: integer
            readabilityScore:
              type: integer
            engagementScore:
              type: integer

    ImageInfo:
      type: object
      properties:
        filename:
          type: string
        path:
          type: string
        url:
          type: string
        width:
          type: integer
        height:
          type: integer
        style:
          type: string

    Card:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [source, info, style, platform]
        description:
          type: string
        content:
          type: string
        path:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        taskId:
          type: string
        type:
          type: string
          enum: [generate, batch, publish]
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        params:
          type: object
        result:
          type: object
        error:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    FeedbackRequest:
      type: object
      required: [problem]
      properties:
        draftId:
          type: string
          description: 关联的草稿ID
        problem:
          type: string
          description: 问题描述
          minLength: 5
        suggestion:
          type: string
          description: 改进建议
        category:
          type: string
          description: 问题分类
        account:
          type: string
          description: 关联账号
        severity:
          type: string
          enum: [low, medium, high]
          default: medium

    Feedback:
      type: object
      properties:
        id:
          type: string
        draftId:
          type: string
        problem:
          type: string
        suggestion:
          type: string
        category:
          type: string
        account:
          type: string
        severity:
          type: string
        status:
          type: string
          enum: [open, resolved, ignored]
        createdAt:
          type: string
          format: date-time

    FeedbackAnalysis:
      type: object
      properties:
        totalFeedbacks:
          type: integer
        rules:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              rule:
                type: string
              frequency:
                type: integer
              lastSeen:
                type: string
                format: date-time
        categoryStats:
          type: object
          additionalProperties:
            type: integer
        recommendations:
          type: array
          items:
            type: string

    Review:
      type: object
      properties:
        id:
          type: string
        draftId:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        submittedBy:
          type: string
        reviewer:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time

    ServiceStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        version:
          type: string
        uptime:
          type: integer
        llm:
          type: object
          properties:
            provider:
              type: string
            model:
              type: string
            configured:
              type: boolean

    HealthCheckResult:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        uptime:
          type: integer
        components:
          type: object
          properties:
            llm:
              type: object
              properties:
                status:
                  type: string
                provider:
                  type: string
                model:
                  type: string
            storage:
              type: object
              properties:
                status:
                  type: string
                type:
                  type: string
                available:
                  type: boolean
            config:
              type: object
              properties:
                status:
                  type: string
                valid:
                  type: boolean

    PublishRequest:
      type: object
      required: [draftId, platform]
      properties:
        draftId:
          type: string
          description: 草稿ID
        platform:
          type: string
          description: 目标平台
          enum: [wechat, wordpress, weibo, zhihu, xiaohongshu, douyin, toutiao]
        options:
          type: object
          properties:
            status:
              type: string
              enum: [draft, publish]
              default: draft
            schedule:
              type: string
              format: date-time

    PublishResponse:
      type: object
      properties:
        success:
          type: boolean
        platform:
          type: string
        url:
          type: string
        id:
          type: string
        status:
          type: string
          enum: [success, manual, failed]
        tips:
          type: array
          items:
            type: string
        error:
          type: string

    PublishRecord:
      type: object
      properties:
        id:
          type: string
        draftId:
          type: string
        platform:
          type: string
        status:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time

    PlatformInfo:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        autoPublish:
          type: boolean
        type:
          type: string
          enum: [official, manual, self-hosted]
        features:
          type: array
          items:
            type: string

    UserPreferences:
      type: object
      properties:
        avoid:
          type: array
          items:
            type: string
          description: 避免使用的词汇
        prefer:
          type: array
          items:
            type: string
          description: 偏好使用的词汇
        style:
          type: object
          properties:
            tone:
              type: string
            sentenceLength:
              type: string
            punctuation:
              type: array
              items:
                type: string
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PreferenceRule'

    PreferenceRule:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [avoid, prefer, style]
        pattern:
          type: string
        replacement:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        source:
          type: string
          enum: [edit, feedback, explicit]
        createdAt:
          type: string
          format: date-time

    Persona:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        title:
          type: string
        avatar:
          type: string
        identity:
          type: string
        tone:
          type: array
          items:
            type: string
        catchphrases:
          type: array
          items:
            type: string
        audience:
          type: object
          properties:
            age:
              type: string
            occupation:
              type: array
              items:
                type: string
        topics:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PersonaInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        title:
          type: string
        avatar:
          type: string
        identity:
          type: string
        tone:
          type: array
          items:
            type: string
        catchphrases:
          type: array
          items:
            type: string
        audience:
          type: object
        topics:
          type: array
          items:
            type: string

    Style:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        language:
          type: object
          properties:
            tone:
              type: string
            person:
              type: string
            sentenceLength:
              type: string
            punctuation:
              type: array
              items:
                type: string
        structure:
          type: object
          properties:
            opening:
              type: array
              items:
                type: string
            body:
              type: array
              items:
                type: string
            closing:
              type: array
              items:
                type: string
        avoid:
          type: array
          items:
            type: string
        prefer:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StyleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        language:
          type: object
        structure:
          type: object
        avoid:
          type: array
          items:
            type: string
        prefer:
          type: array
          items:
            type: string

    AppSettings:
      type: object
      properties:
        defaultPlatform:
          type: string
        defaultPersona:
          type: string
        defaultStyle:
          type: string
        llmProvider:
          type: string
        llmModel:
          type: string
        imageGeneration:
          type: boolean
        imageProvider:
          type: string
        storageType:
          type: string
          enum: [local, icloud]
        autoSave:
          type: boolean
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: "Invalid parameter: source is required"

    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: "API key is required"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: "Draft not found"

    RateLimited:
      description: 请求过多
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate_limited
            message: "Too many requests, please try again later"
