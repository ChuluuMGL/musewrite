          description: 查询最近N天的反馈
          schema:
            type: integer
            default: 7
        - name: account
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 反馈列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  feedbacks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feedback'
                  total:
                    type: integer

  /api/v1/feedback/analyze:
    get:
      tags: [Feedback]
      summary: 分析反馈
      description: 分析反馈数据，提炼改进规则
      security:
        - ApiKeyAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackAnalysis'

  # ==================== LLM Provider ====================
  /api/v1/llm/info:
    get:
      tags: [System]
