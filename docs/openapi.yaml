openapi: 3.0.3
info:
  title: AI-Writer API
  description: |
    AI 驱动的内容生成执行器 - 基于四层卡片体系的内容生成系统

    ## 核心概念

    **四层卡片体系**：
    - 素材卡(Source)：原始素材内容
    - 信息卡(Info)：账号/人设信息
    - 风格卡(Style)：写作风格定义
    - 平台卡(Platform)：发布规范要求

    ## 特点

    - 支持 7 种 LLM Provider
    - 支持 16 个主流平台
    - 内置质量检查和敏感词过滤
    - 支持配图生成(SeedDream)
    - 多账号人设管理

  version: 1.0.0
  contact:
    name: Zhoumo
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:18062
    description: 本地开发服务器
  - url: https://api.aiwriter.example.com
    description: 生产环境服务器

tags:
  - name: Content Generation
    description: 内容生成相关接口
  - name: Task Management
    description: 任务管理相关接口
  - name: Card Management
    description: 卡片管理相关接口
  - name: Feedback
    description: 反馈系统相关接口
  - name: System
    description: 系统状态相关接口

paths:
  # ==================== 系统状态 ====================
  /health:
    get:
      tags: [System]
      summary: 健康检查
      description: 检查服务是否正常运行
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
              example:
                status: ok
                timestamp: "2026-03-11T08:00:00Z"
                version: "1.0.0"

  /api/v1/status:
    get:
      tags: [System]
      summary: 服务状态
      description: 获取服务详细状态信息，包括 LLM Provider 配置
      responses:
        '200':
          description: 服务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'
              example:
                llm:
                  provider: openai
                  model: gpt-4o-mini
                  configured: true
                version: 1.0.0
                uptime: 3600

  # ==================== 内容生成 ====================
  /api/v1/generate:
    post:
      tags: [Content Generation]
      summary: 生成内容（同步）
      description: |
        根据素材和卡片配置生成内容。这是一个同步接口，适合快速生成场景。

        对于大批量或长时间生成任务，建议使用异步任务接口。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            examples:
              basic:
                summary: 基础生成
                value:
                  source: "今天完成了三层记忆系统的改造..."
                  platform: xiaohongshu
              withImage:
                summary: 生成内容+配图
                value:
                  source: "AI-Writer v1.0.0 发布"
                  platform: xiaohongshu
                  info: stone
                  image: true
              multiPlatform:
                summary: 多平台生成
                value:
                  source: "项目更新内容"
                  platforms: [xiaohongshu, wordpress]
                  info: zhoumo
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
              example:
                success: true
                draft:
                  title: "3个AI工具让你效率翻倍！亲测有效"
                  content: "今天分享3个我常用的AI工具..."
                  tags: ["AI工具", "效率提升"]
                  platform: xiaohongshu
                  account: stone
                  quality:
                    score: 85
                    issues: []
                    warnings: ["建议增加更多个人经历"]
                image:
                  filename: cover-123.png
                  path: /path/to/covers/2026-03-11/
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/generate/batch:
    post:
      tags: [Content Generation]
      summary: 批量生成内容
      description: 为多个平台或账号批量生成内容
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source:
                  type: string
                  description: 素材内容
                platforms:
                  type: array
                  items:
                    type: string
                  description: 目标平台列表
                accounts:
                  type: array
                  items:
                    type: string
                  description: 账号列表（信息卡名称）
                options:
                  $ref: '#/components/schemas/GenerateOptions'
      responses:
        '200':
          description: 批量生成结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/GenerateResponse'
                  total:
                    type: integer
                  failed:
                    type: integer

  # ==================== 卡片管理 ====================
  /api/v1/cards:
    get:
      tags: [Card Management]
      summary: 列出所有卡片
      description: 根据类型列出可用的卡片列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: type
          in: query
          description: 卡片类型
          schema:
            type: string
            enum: [source, info, style, platform]
      responses:
        '200':
          description: 卡片列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'

  /api/v1/cards/{type}/{name}:
    get:
      tags: [Card Management]
      summary: 获取卡片详情
      security:
        - ApiKeyAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [source, info, style, platform]
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 卡片详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 草稿管理 ====================
  /api/v1/drafts:
    get:
      tags: [Task Management]
      summary: 列出草稿
      description: 列出已生成的草稿列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [draft, reviewed, published, archived]
        - name: platform
          in: query
          description: 按平台筛选
          schema:
            type: string
        - name: limit
          in: query
          description: 返回数量限制
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: 分页偏移
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 草稿列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftList'

  /api/v1/drafts/{id}:
    get:
      tags: [Task Management]
      summary: 获取草稿详情
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 草稿详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Task Management]
      summary: 更新草稿
      description: 更新草稿内容或状态
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [draft, reviewed, published, archived]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

    delete:
      tags: [Task Management]
      summary: 删除草稿
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/drafts/{id}/quality:
    get:
      tags: [Task Management]
      summary: 质量检查
      description: 对草稿进行质量检查
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 质量检查结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityResult'

  # ==================== 版本管理（新功能）====================
  /api/v1/drafts/{id}/versions:
    get:
      tags: [Task Management]
      summary: 获取版本历史
      description: 获取草稿的所有历史版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                properties:
                  draftId:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: '#/components/schemas/DraftVersion'

    post:
      tags: [Task Management]
      summary: 创建新版本
      description: 保存当前草稿为新版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 版本说明
      responses:
        '201':
          description: 版本创建成功

  /api/v1/drafts/{id}/versions/{version}:
    get:
      tags: [Task Management]
      summary: 获取特定版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 版本详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftVersion'

    post:
      tags: [Task Management]
      summary: 回滚到指定版本
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  # ==================== 审核流程（新功能）====================
  /api/v1/drafts/{id}/review:
    post:
      tags: [Task Management]
      summary: 提交审核
      description: 将草稿提交审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewer:
                  type: string
                  description: 指定审核人
                message:
                  type: string
                  description: 提交说明
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /api/v1/drafts/{id}/review/approve:
    post:
      tags: [Task Management]
      summary: 批准审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: 批准说明
      responses:
        '200':
          description: 批准成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /api/v1/drafts/{id}/review/reject:
    post:
      tags: [Task Management]
      summary: 拒绝审核
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: 拒绝原因
                suggestions:
                  type: string
                  description: 修改建议
      responses:
        '200':
          description: 拒绝成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'

  /api/v1/reviews:
    get:
      tags: [Task Management]
      summary: 获取待审核列表
      description: 获取当前用户待审核的草稿列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: assignee
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 审核列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  total:
                    type: integer

  # ==================== 异步任务 ====================
  /api/v1/tasks:
    post:
      tags: [Task Management]
      summary: 创建异步任务
      description: |
        创建异步生成任务，适合大批量或长时间运行的任务。

        任务类型：
        - `generate`: 内容生成
        - `batch`: 批量生成
        - `publish`: 发布任务
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, params]
              properties:
                type:
                  type: string
                  enum: [generate, batch, publish]
                params:
                  type: object
                callback:
                  type: string
                  description: 任务完成回调URL
            example:
              type: generate
              params:
                source: "项目更新内容"
                platform: xiaohongshu
                info: stone
                image: true
      responses:
        '201':
          description: 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              example:
                taskId: task-abc123
                status: pending
                createdAt: "2026-03-11T08:00:00Z"

    get:
      tags: [Task Management]
      summary: 列出任务
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer

  /api/v1/tasks/{taskId}:
    get:
      tags: [Task Management]
      summary: 获取任务状态
      security:
        - ApiKeyAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Task Management]
      summary: 取消任务
      security:
        - ApiKeyAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务已取消
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 反馈系统 ====================
  /api/v1/feedback:
    post:
      tags: [Feedback]
      summary: 添加反馈
      description: 记录内容问题和改进建议，用于持续优化生成质量
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: 反馈已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feedback'

    get:
      tags: [Feedback]
      summary: 获取反馈列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: days
          in: query
          description: 查询最近N天的反馈
          schema:
            type: integer
            default: 7
        - name: account
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 反馈列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  feedbacks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feedback'
                  total:
                    type: integer

  /api/v1/feedback/analyze:
    get:
      tags: [Feedback]
      summary: 分析反馈
      description: 分析反馈数据，提炼改进规则
      security:
        - ApiKeyAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackAnalysis'

  # ==================== LLM Provider ====================
  /api/v1/llm/info:
    get:
      tags: [System]
      summary: 获取 LLM 配置信息
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: LLM 配置信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                  model:
                    type: string
                  configured:
                    type: boolean
                  availableProviders:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        type:
                          type: string
                          enum: [local, cloud]
                        free:
                          type: boolean
                        env:
                          type: string

  /api/v1/llm/providers:
    get:
      tags: [System]
      summary: 列出支持的 LLM Provider
      responses:
        '200':
          description: Provider 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    free:
                      type: boolean
                    envKey:
                      type: string

# ==================== 组件定义 ====================
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证

  schemas:
    GenerateRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          description: 素材内容
          minLength: 10
          maxLength: 10000
        platform:
          type: string
          description: 目标平台
          default: xiaohongshu
          enum: [xiaohongshu, douyin, wechat, zhihu, bilibili, weibo, toutiao, baijiahao, wordpress, youtube, instagram, tiktok, twitter, linkedin, reddit, github, facebook]
        platforms:
          type: array
          description: 多平台生成时的目标平台列表
          items:
            type: string
        info:
          type: string
          description: 信息卡名称（账号人设）
          default: stone
        style:
          type: string
          description: 风格卡名称
        checkFeedback:
          type: boolean
          description: 是否检查反馈清单
          default: true
        image:
          type: boolean
          description: 是否生成配图
          default: false
        publish:
          type: boolean
          description: 生成后是否自动发布
          default: false
        options:
          $ref: '#/components/schemas/GenerateOptions'

    GenerateOptions:
      type: object
      properties:
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.7
          description: 生成温度
        maxTokens:
          type: integer
          minimum: 100
          maximum: 4000
          default: 2000
          description: 最大Token数
        timeout:
          type: integer
          description: 超时时间(毫秒)
          default: 60000

    GenerateResponse:
      type: object
      properties:
        success:
          type: boolean
        draft:
          $ref: '#/components/schemas/Draft'
        error:
          type: string

    Draft:
      type: object
      properties:
        id:
          type: string
          description: 草稿ID
        title:
          type: string
          description: 标题
        content:
          type: string
          description: 正文内容
        tags:
          type: array
          description: 标签列表
          items:
            type: string
        platform:
          type: string
          description: 目标平台
        account:
          type: string
          description: 账号名称
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, published, archived]
          default: draft
        quality:
          $ref: '#/components/schemas/QualityResult'
        image:
          $ref: '#/components/schemas/ImageInfo'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          description: 当前版本号
          default: 1

    DraftList:
      type: object
      properties:
        drafts:
          type: array
          items:
            $ref: '#/components/schemas/Draft'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    DraftVersion:
      type: object
      properties:
        version:
          type: integer
