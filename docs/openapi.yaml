  # ==================== 异步任务 ====================
  /api/v1/tasks:
    post:
      tags: [Task Management]
      summary: 创建异步任务
      description: |
        创建异步生成任务，适合大批量或长时间运行的任务。

        任务类型：
        - `generate`: 内容生成
        - `batch`: 批量生成
        - `publish`: 发布任务
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, params]
              properties:
                type:
                  type: string
                  enum: [generate, batch, publish]
                params:
                  type: object
                callback:
                  type: string
                  description: 任务完成回调URL
            example:
              type: generate
              params:
                source: "项目更新内容"
                platform: xiaohongshu
                info: stone
                image: true
      responses:
        '201':
          description: 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              example:
                taskId: task-abc123
                status: pending
                createdAt: "2026-03-12T08:00:00Z"

    get:
      tags: [Task Management]
      summary: 列出任务
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer

  /api/v1/tasks/{taskId}:
    get:
      tags: [Task Management]
      summary: 获取任务状态
      security:
        - ApiKeyAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Task Management]
      summary: 取消任务
      security:
        - ApiKeyAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务已取消
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 反馈系统 ====================
  /api/v1/feedback:
    post:
      tags: [Feedback]
      summary: 添加反馈
      description: 记录内容问题和改进建议，用于持续优化生成质量
      security:
